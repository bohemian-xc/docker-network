version: '3.8'  # Use an appropriate version of Docker Compose

services:
  app:
    image: alpine:latest
    container_name: network_container
    command: tail -f /dev/null
    networks:
      - shared_bridge
      - vlan10_net
      - vlan100_net
      - vlan200_net
    volumes:
      - ./vol:/data
    restart: always
    healthcheck:
      # Check if the gateway (e.g., 192.168.1.1) is reachable
      test: ["CMD-SHELL", "${HEALTHCHECK_CMD}"]
      interval: ${HEALTHCHECK_INT}
      timeout: ${HEALTHCHECK_TOT}
      retries: ${HEALTHCHECK_RTS}
      start_period: ${HEALTHCHECK_STP}

networks:
  shared_bridge:
    name: ${BRIDGE_NAME}
    driver: bridge
  vlan10_net:
    name: ${VLAN10_NAME}
    driver: macvlan
    driver_opts:
      parent: ${VLAN10_PARENT}
    ipam:
      config:
        - subnet: ${VLAN10_SUBNET}
          gateway: ${VLAN10_GATEWAY}
          ip_range: ${VLAN10_IPRANGE}
  vlan100_net:
    name: ${VLAN100_NAME}
    driver: macvlan
    driver_opts:
      parent: ${VLAN100_PARENT}
    ipam:
      config:
        - subnet: ${VLAN100_SUBNET}
          gateway: ${VLAN100_GATEWAY}
          ip_range: ${VLAN100_IPRANGE}
  vlan200_net:
    name: ${VLAN200_NAME}
    driver: macvlan
    driver_opts:
      parent: ${VLAN200_PARENT}
    ipam:
      config:
        - subnet: ${VLAN200_SUBNET}
          gateway: ${VLAN200_GATEWAY}
          ip_range: ${VLAN200_IPRANGE}
