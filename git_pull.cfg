# git_pull.cfg - configuration for git_pull.sh
# Edit the values below to match your environment. Lines starting with '#' are comments.

# Path to the repository to pull (required)
REPO_PATH=~/repos/docker-network

# Full path to git executable (required)
GIT_EXEC=/usr/bin/git

# Git remote and branch (optional)
REMOTE=origin
BRANCH=main

# Optional: short description to include in each log line after the timestamp
GIT_PULL_DESC="docker-network pull"

# Optional: full path to a log file to append output to (optional)
LOG_FILE=~/logs/git_pull.log

